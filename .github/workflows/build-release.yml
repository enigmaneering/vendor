name: Build and Release Redistributables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Need write permission to create and push tags
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to find all tags

      - name: Calculate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - calculate next version from latest tag
            # Get all tags matching vX.Y.Z format (excluding go/fetch/gpu tags like go/fetch/gpu/v1.0.0)
            LATEST_TAG=$(git tag | grep '^v[0-9]\+\.[0-9]\+\.[0-9]\+$' | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              # No tags yet - start at v0.0.45 (continuing from where we left off)
              LATEST_TAG="v0.0.44"
            fi
            echo "Latest tag: $LATEST_TAG"

            # Extract version numbers (expecting vX.Y.Z format)
            if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"

              # Increment patch version
              NEXT_PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
            else
              # Fallback if tag format is unexpected
              VERSION="v0.0.45"
            fi

            echo "Next version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            # Create and push the tag (both for main release and go/fetch/gpu module)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Create main release tag (vX.Y.Z)
            git tag $VERSION
            git push origin $VERSION
          else
            # Tag push - use the tag name
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  build-glslang:
    needs: [determine-version]
    name: Build glslang
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-python
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build glslang (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          echo "DEBUG: Checking for clang..."
          which clang || echo "clang not found"
          which clang.exe || echo "clang.exe not found"
          ls -la /mingw64/bin/clang* || echo "No clang binaries found"
          echo "DEBUG: PATH=$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-glslang.sh

      - name: Build glslang (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-glslang.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-glslang.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/glslang-${{ matrix.platform }}.*

  build-spirv-cross:
    needs: [determine-version]
    name: Build SPIRV-Cross
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build SPIRV-Cross (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Build SPIRV-Cross (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-spirv-cross.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-cross-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-cross-${{ matrix.platform }}.*

  build-dxc:
    needs: [determine-version]
    name: Build DXC (from source)
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies for DXC (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11 python3
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Build DXC (macOS/Linux)
        shell: bash
        run: |
          chmod +x scripts/build-dxc.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-dxc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/dxc-${{ matrix.platform }}.*

  download-dxc-prebuilt:
    needs: [determine-version]
    name: Download DXC (Prebuilt)
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-latest
            source: github
          - platform: windows-amd64
            os: windows-latest
            source: nuget
            nuget_arch: x64
          - platform: windows-arm64
            os: windows-latest
            source: nuget
            nuget_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download DXC from GitHub (Linux)
        if: matrix.source == 'github'
        run: |
          # Query GitHub API for latest release
          echo "Querying GitHub for latest DXC release..."
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest)
          RELEASE_TAG=$(echo "$LATEST_RELEASE" | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')

          # Find the Linux x86_64 asset
          ASSET_NAME=$(echo "$LATEST_RELEASE" | grep '"name".*linux.*x86_64.*tar.gz' | head -1 | sed -E 's/.*"name": "([^"]+)".*/\1/')

          if [ -z "$RELEASE_TAG" ] || [ -z "$ASSET_NAME" ]; then
            echo "Error: Could not determine latest release or asset name"
            exit 1
          fi

          echo "Latest release: $RELEASE_TAG"
          echo "Asset name: $ASSET_NAME"

          DOWNLOAD_URL="https://github.com/microsoft/DirectXShaderCompiler/releases/download/$RELEASE_TAG/$ASSET_NAME"
          echo "Downloading DXC for ${{ matrix.platform }} from GitHub"

          # Download and verify licenses before downloading large binary (fail fast)
          echo "Downloading DXC licenses..."
          mkdir -p licenses
          curl -L -o licenses/LICENSE.TXT \
            "https://raw.githubusercontent.com/microsoft/DirectXShaderCompiler/$RELEASE_TAG/LICENSE.TXT" || \
          curl -L -o licenses/LICENSE.TXT \
            "https://raw.githubusercontent.com/microsoft/DirectXShaderCompiler/main/LICENSE.TXT"

          # Download DxilCompression license
          curl -L -o licenses/DxilCompression-LICENSE.TXT \
            "https://raw.githubusercontent.com/microsoft/DirectXShaderCompiler/$RELEASE_TAG/lib/DxilCompression/LICENSE.TXT" || \
          curl -L -o licenses/DxilCompression-LICENSE.TXT \
            "https://raw.githubusercontent.com/microsoft/DirectXShaderCompiler/main/lib/DxilCompression/LICENSE.TXT"

          if [ ! -f licenses/LICENSE.TXT ]; then
            echo "Error: Failed to download main LICENSE"
            exit 1
          fi
          echo "Licenses verified"

          curl -L -o dxc.tar.gz "$DOWNLOAD_URL"

          # Extract and repackage
          mkdir -p output/dxc-${{ matrix.platform }}
          tar -xzf dxc.tar.gz -C output/dxc-${{ matrix.platform }}

          # Copy licenses
          cp licenses/LICENSE.TXT output/dxc-${{ matrix.platform }}/LICENSE.TXT
          mkdir -p output/dxc-${{ matrix.platform }}/LICENSES
          if [ -f licenses/DxilCompression-LICENSE.TXT ]; then
            cp licenses/DxilCompression-LICENSE.TXT output/dxc-${{ matrix.platform }}/LICENSES/
          fi

          # Create archive
          cd output
          tar -czf dxc-${{ matrix.platform }}.tar.gz dxc-${{ matrix.platform }}

      - name: Download DXC from NuGet (Windows)
        if: matrix.source == 'nuget'
        shell: pwsh
        run: |
          $package = "Microsoft.Direct3D.DXC"
          $platform = "${{ matrix.platform }}"
          $arch = "${{ matrix.nuget_arch }}"

          # Query NuGet for latest version
          Write-Host "Querying NuGet for latest version of $package..."
          $indexUrl = "https://api.nuget.org/v3-flatcontainer/$($package.ToLower())/index.json"
          $versionsJson = Invoke-RestMethod -Uri $indexUrl
          $version = $versionsJson.versions[-1]
          Write-Host "Latest version: $version"

          Write-Host "Downloading $package version $version from NuGet for $platform"

          # Download NuGet package
          $nugetUrl = "https://www.nuget.org/api/v2/package/$package/$version"
          Invoke-WebRequest -Uri $nugetUrl -OutFile "dxc.nupkg"

          # NuGet packages are zip files
          Expand-Archive -Path "dxc.nupkg" -DestinationPath "nuget-extract"

          # Verify license exists before copying binaries (fail fast)
          Write-Host "Verifying license..."
          $licenseExists = $false
          if (Test-Path "nuget-extract/LICENSE.txt") {
            $licenseExists = $true
          } elseif (Test-Path "nuget-extract/LICENSE.TXT") {
            $licenseExists = $true
          } elseif (Test-Path "nuget-extract/LICENSE") {
            $licenseExists = $true
          }
          if (-not $licenseExists) {
            Write-Error "Error: LICENSE not found in NuGet package"
            exit 1
          }
          Write-Host "License verified"

          # Create output directory
          New-Item -ItemType Directory -Force -Path "output/dxc-$platform"

          # Windows binaries are in build/native/bin/{arch}/
          Copy-Item -Path "nuget-extract/build/native/bin/$arch/*" -Destination "output/dxc-$platform/" -Recurse

          # Copy licenses from NuGet package
          Write-Host "Copying licenses..."
          # Main license
          if (Test-Path "nuget-extract/LICENSE.txt") {
            Copy-Item -Path "nuget-extract/LICENSE.txt" -Destination "output/dxc-$platform/LICENSE.txt"
          } elseif (Test-Path "nuget-extract/LICENSE.TXT") {
            Copy-Item -Path "nuget-extract/LICENSE.TXT" -Destination "output/dxc-$platform/LICENSE.TXT"
          } else {
            Copy-Item -Path "nuget-extract/LICENSE" -Destination "output/dxc-$platform/LICENSE"
          }

          # Additional licenses
          New-Item -ItemType Directory -Force -Path "output/dxc-$platform/LICENSES"
          if (Test-Path "nuget-extract/LICENSE-LLVM.txt") {
            Copy-Item -Path "nuget-extract/LICENSE-LLVM.txt" -Destination "output/dxc-$platform/LICENSES/LICENSE-LLVM.txt"
          }

          # Create archive
          cd output
          Compress-Archive -Path "dxc-$platform" -DestinationPath "dxc-$platform.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: |
            output/dxc-${{ matrix.platform }}.tar.gz
            output/dxc-${{ matrix.platform }}.zip

  build-naga:
    needs: [determine-version]
    name: Build Naga
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build Naga (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          chmod +x scripts/build-naga.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-naga.sh

      - name: Build Naga (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/build-naga.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          CMAKE_ARCH="${{ matrix.platform == 'linux-arm64' && 'aarch64' || '' }}" \
          bash scripts/build-naga.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: naga-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/naga-${{ matrix.platform }}.*

  build-pocl:
    needs: [determine-version]
    name: Build POCL
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev clang libclang-dev cmake pkg-config libhwloc-dev ocl-icd-opencl-dev

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm cmake pkg-config hwloc

      - name: Build POCL (macOS/Linux)
        shell: bash
        run: |
          chmod +x scripts/build-pocl.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-pocl.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocl-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/pocl-${{ matrix.platform }}.*

  create-release:
    name: Create Shader Binaries Release
    needs: [determine-version, build-glslang, build-spirv-cross, build-dxc, download-dxc-prebuilt, build-naga, build-pocl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download shader binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{glslang,spirv-cross,dxc,naga,pocl}-*'

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Create redistributables Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.determine-version.outputs.version }}
          name: redistributables ${{ needs.determine-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          body: |
            # Shader Compilation Toolchain ${{ needs.determine-version.outputs.version }}

            Complete cross-platform shader compilation toolchain with support for GLSL, HLSL, WGSL, and SPIRV. Pre-built binaries for all supported platforms.

            ## 🚀 Quick Start

            ### Automated Installation (Recommended)

            Use the [`fetch` CLI tool](https://git.enigmaneering.org/enigmaneering/external/releases/tag/${{ needs.determine-version.outputs.gpu_version }}) or [Go module](https://git.enigmaneering.org/enigmaneering/external/tree/main/go/fetch) for automatic installation:

            ```bash
            # Download fetch CLI from the go/fetch release
            # See: https://git.enigmaneering.org/enigmaneering/external/releases/tag/${{ needs.determine-version.outputs.gpu_version }}

            ./fetch  # Automatically downloads and installs this version
            ```

            Or use the Go module:

            ```go
            import "github.com/enigmaneering/external/go/fetch/gpu"

            func main() {
                // Automatically downloads latest toolchain to ./external/
                if err := gpu.EnsureLibraries(); err != nil {
                    log.Fatal(err)
                }
            }
            ```

            ## 🛠️ Included Tools

            | Tool | Description | Capabilities |
            |------|-------------|--------------|
            | **glslang** | Reference GLSL/ESSL validator and compiler | GLSL/ESSL → SPIRV, with SPIRV optimizer |
            | **SPIRV-Cross** | SPIRV reflection and transpiler | SPIRV → GLSL/HLSL/MSL/WGSL |
            | **DXC** | DirectX Shader Compiler | HLSL → SPIRV/DXIL, WGSL support |
            | **Naga** | Rust-based WebGPU shader compiler | WGSL/GLSL/SPIRV ↔ SPIRV/WGSL/MSL/HLSL/GLSL |
            | **POCL** | Portable Computing Language (OpenCL) | CPU-based OpenCL runtime with LLVM JIT |

            ## 💻 Supported Platforms

            All binaries are provided for the following platforms:

            - ✅ macOS ARM64 (Apple Silicon M1/M2/M3/M4)
            - ✅ macOS x86_64 (Intel)
            - ✅ Linux x86_64 (glibc 2.31+)
            - ✅ Linux ARM64 (glibc 2.31+)
            - ✅ Windows x86_64
            - ✅ Windows ARM64

            **Note:** POCL is currently built for macOS and Linux platforms only.

            ## 📦 Manual Installation

            Download the appropriate `.tar.gz` (Unix) or `.zip` (Windows) archives for your platform and extract them to your project's `external/` directory.

            Each tool is packaged separately:
            - `glslang-{platform}.tar.gz` / `.zip`
            - `spirv-cross-{platform}.tar.gz` / `.zip`
            - `dxc-{platform}.tar.gz` / `.zip`
            - `naga-{platform}.tar.gz` / `.zip`
            - `pocl-{platform}.tar.gz` (macOS/Linux only)

            ## 🔄 Version Management

