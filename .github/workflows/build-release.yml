name: Build and Release Vendor Tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-glslang:
    name: Build glslang
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-python
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build glslang (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          echo "DEBUG: Checking for clang..."
          which clang || echo "clang not found"
          which clang.exe || echo "clang.exe not found"
          ls -la /mingw64/bin/clang* || echo "No clang binaries found"
          echo "DEBUG: PATH=$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-glslang.sh

      - name: Build glslang (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-glslang.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-glslang.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/glslang-${{ matrix.platform }}.*

  build-spirv-cross:
    name: Build SPIRV-Cross
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build SPIRV-Cross (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Build SPIRV-Cross (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-spirv-cross.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-cross-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-cross-${{ matrix.platform }}.*

  build-dxc:
    name: Build DXC
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies for DXC (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11 python3
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-python
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Build DXC (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-dxc.sh

      - name: Build DXC (macOS/Linux)
        if: ${{ !matrix.mingw_arch }}
        shell: bash
        run: |
          chmod +x scripts/build-dxc.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-dxc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/dxc-${{ matrix.platform }}.*

  download-dxc-linux:
    name: Download DXC (Linux)
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-amd64
            filename: linux_dxc_2024_07_31.x86_64.tar.gz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Microsoft DXC Release
        run: |
          DOWNLOAD_URL="https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2407/${{ matrix.filename }}"
          echo "Downloading DXC for ${{ matrix.platform }}"
          echo "Download URL: $DOWNLOAD_URL"

          curl -L -o dxc.tar.gz "$DOWNLOAD_URL"

          # Extract and repackage
          mkdir -p output/dxc-${{ matrix.platform }}
          tar -xzf dxc.tar.gz -C output/dxc-${{ matrix.platform }}

          # Create archive
          cd output
          tar -czf dxc-${{ matrix.platform }}.tar.gz dxc-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: output/dxc-${{ matrix.platform }}.tar.gz

  create-release:
    name: Create Release
    needs: [build-glslang, build-spirv-cross, build-dxc, download-dxc-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          body: |
            # Vendor Tools Release ${{ steps.version.outputs.version }}

            Pre-built shader compilation toolchain for all platforms.

            ## Included Tools

            - **glslang** - GLSL to SPIRV compiler with optimizer
            - **SPIRV-Cross** - SPIRV transpiler (GLSL/HLSL/MSL)
            - **DXC** - DirectX Shader Compiler (HLSL to SPIRV/DXIL)

            ## Supported Platforms

            - macOS ARM64 (Apple Silicon)
            - macOS x86_64 (Intel)
            - Linux x86_64
            - Windows x86_64

            ## Usage

            Download the appropriate archives for your platform and extract to your project's `external/` directory.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
