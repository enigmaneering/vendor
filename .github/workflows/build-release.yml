name: Build and Release Redistributables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Why this build was triggered (auto-filled by version check)"
        required: false
        default: "Alpha and Omega"
        type: string

jobs:
  announce:
    name: Trigger Info
    runs-on: ubuntu-latest
    steps:
      - name: Display trigger reason
        run: |
          echo "## Build Trigger" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REASON="${{ inputs.trigger_reason }}"
            if [ -z "$REASON" ] || [ "$REASON" = "Manual dispatch" ]; then
              echo "**Triggered by:** Manual dispatch" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Triggered by:** $REASON" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "**Triggered by:** Tag push (${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          fi

  # ================================================================
  #  Resolve all three upstream commits we'll build against in ONE
  #  atomic step.  Doing this together (rather than per-build) eliminates
  #  a real race: clspv main can move between separate resolutions, and
  #  if our LLVM SHA comes from a DIFFERENT clspv tree than the one we
  #  later build, we ship LLVM that doesn't match the clspv we shipped.
  #
  #  Resolution order:
  #    1. clspv main HEAD             — drives our clspv build
  #    2. LLVM SHA from clspv@HEAD's  — drives our LLVM build, transitively
  #       deps.json                     pinned to the SAME clspv tree we
  #                                     resolved in step 1
  #    3. SPIRV-LLVM-Translator main  — its main branch tracks LLVM main
  #       HEAD                          like clspv's pin, so co-evolves
  #
  #  All three SHAs feed cache keys for their respective builds, so any
  #  upstream movement automatically invalidates the cache.
  # ================================================================
  determine-shas:
    name: Resolve upstream commits
    runs-on: ubuntu-latest
    outputs:
      llvm_sha: ${{ steps.resolve.outputs.llvm_sha }}
      clspv_sha: ${{ steps.resolve.outputs.clspv_sha }}
      translator_sha: ${{ steps.resolve.outputs.translator_sha }}
    steps:
      - id: resolve
        run: |
          set -e

          CLSPV_SHA=$(curl -sSLf https://api.github.com/repos/google/clspv/commits/main \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sha"])')

          # Read deps.json AT the resolved clspv SHA (not main HEAD again) —
          # this is the load-bearing part of avoiding the race.
          LLVM_SHA=$(curl -sSLf "https://raw.githubusercontent.com/google/clspv/$CLSPV_SHA/deps.json" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(c["commit"] for c in d["commits"] if c["name"]=="llvm"))')

          TRANSLATOR_SHA=$(curl -sSLf https://api.github.com/repos/KhronosGroup/SPIRV-LLVM-Translator/commits/main \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sha"])')

          for var in CLSPV_SHA LLVM_SHA TRANSLATOR_SHA; do
            eval "val=\$$var"
            if [ -z "$val" ]; then
              echo "::error::Could not resolve $var"
              exit 1
            fi
            echo "$var=$val"
          done

          {
            echo "clspv_sha=$CLSPV_SHA"
            echo "llvm_sha=$LLVM_SHA"
            echo "translator_sha=$TRANSLATOR_SHA"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Pinned upstream commits"
            echo "- clspv: \`$CLSPV_SHA\`"
            echo "- LLVM: \`$LLVM_SHA\` (from clspv deps.json @ pinned commit)"
            echo "- SPIRV-LLVM-Translator: \`$TRANSLATOR_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ================================================================
  #  Verify upstream licenses haven't changed before building.
  #  If any license hash doesn't match, the entire release is blocked.
  # ================================================================
  verify-licenses:
    needs: [determine-shas]
    name: Verify Licenses
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for open license issue
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'license-change'
            });
            if (issues.data.length > 0) {
              core.setOutput('blocked', 'true');
              core.setOutput('issue_url', issues.data[0].html_url);
              core.info(`Blocked by open license issue: ${issues.data[0].html_url}`);
            } else {
              core.setOutput('blocked', 'false');
            }

      - name: Block if unresolved license issue exists
        if: steps.existing.outputs.blocked == 'true'
        run: |
          echo "::error::Release blocked by unresolved license issue: ${{ steps.existing.outputs.issue_url }}"
          echo "Close the issue after reviewing the license changes and updating the expected hashes."
          exit 1

      - name: Clone and verify upstream licenses
        run: |
          set -e
          mkdir -p /tmp/license-check && cd /tmp/license-check

          echo "Cloning upstream repositories..."
          git clone --depth 1 https://github.com/KhronosGroup/glslang.git
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Tools.git spirv-tools
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Headers.git spirv-headers
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Cross.git spirv-cross
          git clone --depth 1 https://github.com/gfx-rs/wgpu-native.git wgpu-native
          git clone --depth 1 https://github.com/gfx-rs/wgpu.git wgpu
          # Mesa: only the spirv-to-dxil carve-out lands in our packages,
          # but the umbrella license text is what consumers reference.
          # Pin to the same release tag the build script uses so a Mesa
          # release with a license amendment is caught BEFORE the build.
          git clone --depth 1 --branch mesa-26.0.6 https://gitlab.freedesktop.org/mesa/mesa.git mesa

          # clspv, SPIRV-LLVM-Translator, LLVM: pinned to the EXACT commits
          # determine-shas resolved.  We can't use `git clone --branch <sha>`
          # for arbitrary SHAs — codeload tarball endpoint instead, which
          # also matches what the build scripts will pull.  This guarantees
          # the licenses we verified are the licenses we actually shipped.
          CLSPV_SHA="${{ needs.determine-shas.outputs.clspv_sha }}"
          TRANSLATOR_SHA="${{ needs.determine-shas.outputs.translator_sha }}"
          LLVM_SHA="${{ needs.determine-shas.outputs.llvm_sha }}"

          echo "clspv license check target: $CLSPV_SHA"
          curl -sSLf "https://codeload.github.com/google/clspv/tar.gz/$CLSPV_SHA" | tar -xz
          mv "clspv-$CLSPV_SHA" clspv

          echo "SPIRV-LLVM-Translator license check target: $TRANSLATOR_SHA"
          curl -sSLf "https://codeload.github.com/KhronosGroup/SPIRV-LLVM-Translator/tar.gz/$TRANSLATOR_SHA" | tar -xz
          mv "SPIRV-LLVM-Translator-$TRANSLATOR_SHA" spirv-llvm-translator

          echo "LLVM license check target: $LLVM_SHA"
          curl -sSLf "https://codeload.github.com/llvm/llvm-project/tar.gz/$LLVM_SHA" | tar -xz
          mv "llvm-project-$LLVM_SHA" llvm-project

          # Expected hashes — update when licenses are reviewed and approved
          EXPECTED_GLSLANG="17e70c676e1521ff3e4686f04a2053d93a7e28a33be8de7ec37ab0ff72feb677"
          EXPECTED_SPIRV_TOOLS="cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30"
          EXPECTED_SPIRV_HEADERS="ea43b1de38a6f90c488800d66dec1ed671e68cda530266bc96951fb5b6307613"
          EXPECTED_SPIRV_CROSS="cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30"
          EXPECTED_WGPU_MIT="c7fea58d1cfe49634cd92e54fc10a9d871f4b275321a4cd8c09e449122caaeb4"
          EXPECTED_WGPU_APACHE="a6cba85bc92e0cff7a450b1d873c0eaa2e9fc96bf472df0247a26bec77bf3ff9"
          EXPECTED_NAGA_MIT="dc0d97139e8205818c703741c7be7cb3b96888bd5917b8d6fc6133731e403c21"
          EXPECTED_NAGA_APACHE="a6cba85bc92e0cff7a450b1d873c0eaa2e9fc96bf472df0247a26bec77bf3ff9"
          EXPECTED_CLSPV="2050d82ea19614989deac39163c471b6e753659dfd4e4e88c6f724624db59f32"
          EXPECTED_LLVM="8d85c1057d742e597985c7d4e6320b015a9139385cff4cbae06ffc0ebe89afee"
          EXPECTED_CLANG="ebcd9bbf783a73d05c53ba4d586b8d5813dcdf3bbec50265860ccc885e606f47"
          EXPECTED_SPIRV_TRANSLATOR="e3bc36440fc927c62d5cc24efeefe225a14d4e34ffeb0c92e430625cce9ee444"
          EXPECTED_MESA="0d1a0472ecc81830e75c20d59b0ea02841e3db21255e0ebad97ab682c54d6615"

          FAILED=0
          CHANGES=""

          check() {
            local name="$1" file="$2" expected="$3"
            actual=$(sha256sum "$file" | awk '{print $1}')
            if [ "$actual" != "$expected" ]; then
              echo "::error::$name license has CHANGED (expected $expected, got $actual)"
              CHANGES="${CHANGES}- **${name}**: hash changed from \`${expected}\` to \`${actual}\`\n"
              FAILED=1
            else
              echo "✅ $name license verified"
            fi
          }

          check "glslang" glslang/LICENSE.txt "$EXPECTED_GLSLANG"
          check "SPIRV-Tools" spirv-tools/LICENSE "$EXPECTED_SPIRV_TOOLS"
          check "SPIRV-Headers" spirv-headers/LICENSE "$EXPECTED_SPIRV_HEADERS"
          check "SPIRV-Cross" spirv-cross/LICENSE "$EXPECTED_SPIRV_CROSS"
          check "wgpu-native MIT" wgpu-native/LICENSE.MIT "$EXPECTED_WGPU_MIT"
          check "wgpu-native Apache" wgpu-native/LICENSE.APACHE "$EXPECTED_WGPU_APACHE"
          check "Naga/wgpu MIT" wgpu/LICENSE.MIT "$EXPECTED_NAGA_MIT"
          check "Naga/wgpu Apache" wgpu/LICENSE.APACHE "$EXPECTED_NAGA_APACHE"
          check "clspv" clspv/LICENSE "$EXPECTED_CLSPV"
          check "LLVM" llvm-project/llvm/LICENSE.TXT "$EXPECTED_LLVM"
          check "Clang" llvm-project/clang/LICENSE.TXT "$EXPECTED_CLANG"
          check "SPIRV-LLVM-Translator" spirv-llvm-translator/LICENSE.TXT "$EXPECTED_SPIRV_TRANSLATOR"
          check "Mesa (spirv-to-dxil)" mesa/docs/license.rst "$EXPECTED_MESA"

          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo -e "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          if [ $FAILED -eq 1 ]; then
            echo "LICENSE_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi

          echo ""
          echo "All upstream licenses verified — proceeding with build."

      - name: Create license issue
        if: failure() && env.LICENSE_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Only create if no open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'license-change'
            });

            if (issues.data.length > 0) {
              core.info('License issue already exists, skipping creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream License Change Detected — Releases Blocked',
              body: `An upstream license has changed. All releases are **blocked** until this issue is resolved and closed.

            ## Changes Detected

            ${process.env.CHANGES}

            ## Required Actions

            1. Review the new license text for each changed dependency
            2. Verify the license is still permissive and compatible
            3. Update the expected hashes in \`build-release.yml\` → \`verify-licenses\` job
            4. Close this issue — releases will resume automatically

            ## Workflow Run

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ---
            🤖 This issue was automatically created by the release pipeline.
            **All releases are blocked while this issue is open.**`,
              labels: ['license-change', 'automated']
            });

  build-glslang:
    needs: [verify-licenses]
    name: "Build glslang (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: wasm
            wasm: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-python
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Install Emscripten (WASM)
        if: matrix.wasm
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "5.0.1"

      - name: Build glslang (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          echo "DEBUG: Checking for clang..."
          which clang || echo "clang not found"
          which clang.exe || echo "clang.exe not found"
          ls -la /mingw64/bin/clang* || echo "No clang binaries found"
          echo "DEBUG: PATH=$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-glslang.sh

      - name: Build glslang (macOS/Linux)
        if: ${{ !matrix.mingw_arch && !matrix.wasm }}
        shell: bash
        run: |
          chmod +x scripts/build-glslang.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-glslang.sh

      - name: Build glslang (WASM)
        if: matrix.wasm
        shell: bash
        run: |
          GLSLANG_VERSION=$(curl -s https://api.github.com/repos/KhronosGroup/glslang/releases/latest | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          echo "Building glslang $GLSLANG_VERSION for WASM..."

          mkdir -p wasm-build && cd wasm-build

          git clone --depth 1 --branch "$GLSLANG_VERSION" https://github.com/KhronosGroup/glslang.git
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Tools.git spirv-tools
          git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Headers.git spirv-tools/external/spirv-headers
          mkdir -p glslang/External
          ln -sf ../../spirv-tools glslang/External/spirv-tools

          cd glslang && mkdir -p build && cd build

          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_SPVREMAPPER=OFF \
            -DENABLE_GLSLANG_BINARIES=OFF \
            -DENABLE_CTEST=OFF \
            -DENABLE_OPT=ON \
            -DGLSLANG_TESTS=OFF

          emmake cmake --build . --config Release -j$(nproc)

          # Package
          PACKAGE_DIR="${{ runner.temp }}/output/glslang-wasm"
          mkdir -p "$PACKAGE_DIR"
          find . -name "*.a" -exec cp {} "$PACKAGE_DIR/" \;

          # Copy headers
          cd "${{ github.workspace }}/wasm-build/glslang"
          find . -name "*.h" -o -name "*.hpp" | while read header; do
            mkdir -p "$PACKAGE_DIR/$(dirname "$header")"
            cp "$header" "$PACKAGE_DIR/$header"
          done

          # Copy glslang build_info.h
          if [ -f "build/include/glslang/build_info.h" ]; then
            mkdir -p "$PACKAGE_DIR/build/include/glslang"
            cp "build/include/glslang/build_info.h" "$PACKAGE_DIR/build/include/glslang/"
          fi

          # Licenses
          cp "LICENSE.txt" "$PACKAGE_DIR/LICENSE.txt"
          mkdir -p "$PACKAGE_DIR/LICENSES"
          cp "External/spirv-tools/LICENSE" "$PACKAGE_DIR/LICENSES/SPIRV-Tools-LICENSE"
          cp "External/spirv-tools/external/spirv-headers/LICENSE" "$PACKAGE_DIR/LICENSES/SPIRV-Headers-LICENSE"

          cd "${{ runner.temp }}/output"
          tar -czf "glslang-wasm.tar.gz" "glslang-wasm"
          echo "Created glslang-wasm.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/glslang-${{ matrix.platform }}.*

  build-spirv-cross:
    needs: [verify-licenses]
    name: "Build SPIRV-Cross (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            mingw_arch: x86_64
            cross_compile_target: aarch64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: wasm
            wasm: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW (Windows)
        if: matrix.mingw_arch
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-gcc
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Cache llvm-mingw
        if: matrix.cross_compile_target == 'aarch64'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20260311-ucrt-x86_64
          key: llvm-mingw-20260311-ucrt-x86_64

      - name: Download ARM64 MinGW runtime libraries
        if: matrix.cross_compile_target == 'aarch64' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Download llvm-mingw which has ARM64 runtime libraries
          curl -L -o llvm-mingw.zip https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-x86_64.zip
          unzip -q llvm-mingw.zip

      - name: Setup ARM64 libraries
        if: matrix.cross_compile_target == 'aarch64'
        shell: bash
        run: |
          # Copy ARM64 libraries to a location where the linker can find them (use Windows path)
          mkdir -p D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32
          cp -r llvm-mingw-20260311-ucrt-x86_64/aarch64-w64-mingw32/* D:/a/_temp/msys64/mingw64/aarch64-w64-mingw32/

      - name: Install Emscripten (WASM)
        if: matrix.wasm
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "5.0.1"

      - name: Build SPIRV-Cross (Windows)
        if: matrix.mingw_arch
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          USE_MINGW=1 \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Build SPIRV-Cross (macOS/Linux)
        if: ${{ !matrix.mingw_arch && !matrix.wasm }}
        shell: bash
        run: |
          chmod +x scripts/build-spirv-cross.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Build SPIRV-Cross (WASM)
        if: matrix.wasm
        shell: bash
        run: |
          # Match build-spirv-cross.sh: filter for Vulkan SDK release tags, not
          # whatever GitHub returns as the first tag (which can be a lightweight
          # intermediate tag or empty on rate-limit).
          SPIRV_CROSS_VERSION=$(curl -sSLf https://api.github.com/repos/KhronosGroup/SPIRV-Cross/tags | grep '"name"' | grep 'vulkan-sdk-' | head -1 | sed -E 's/.*"name": "([^"]+)".*/\1/')
          if [ -z "$SPIRV_CROSS_VERSION" ]; then
            echo "Error: could not determine latest SPIRV-Cross vulkan-sdk tag (rate-limited?)"
            exit 1
          fi
          echo "Building SPIRV-Cross $SPIRV_CROSS_VERSION for WASM..."

          mkdir -p wasm-build-spirv && cd wasm-build-spirv
          git clone --depth 1 --branch "$SPIRV_CROSS_VERSION" https://github.com/KhronosGroup/SPIRV-Cross.git
          cd SPIRV-Cross && mkdir -p build && cd build

          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DSPIRV_CROSS_CLI=OFF \
            -DSPIRV_CROSS_ENABLE_TESTS=OFF \
            -DSPIRV_CROSS_SHARED=OFF \
            -DSPIRV_CROSS_STATIC=ON

          emmake cmake --build . --config Release -j$(nproc)

          # Package — match native archive layout (headers + libs at root)
          PACKAGE_DIR="${{ runner.temp }}/output/spirv-cross-wasm"
          mkdir -p "$PACKAGE_DIR"

          # Libraries at root
          find . -name "*.a" -exec cp {} "$PACKAGE_DIR/" \;

          # Headers at root (same layout as native archives)
          cd "${{ github.workspace }}/wasm-build-spirv/SPIRV-Cross"
          cp spirv_cross_c.h spirv.hpp spirv_cross.hpp spirv_glsl.hpp \
             spirv_hlsl.hpp spirv_msl.hpp spirv_common.hpp spirv_cfg.hpp \
             spirv_parser.hpp spirv_cross_parsed_ir.hpp spirv_cross_containers.hpp \
             spirv_cross_error_handling.hpp spirv.h spirv_cpp.hpp \
             "$PACKAGE_DIR/" 2>/dev/null || true

          # License
          cp LICENSE "$PACKAGE_DIR/LICENSE"

          cd "${{ runner.temp }}/output"
          tar -czf "spirv-cross-wasm.tar.gz" "spirv-cross-wasm"
          echo "Created spirv-cross-wasm.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-cross-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-cross-${{ matrix.platform }}.*

  # Mesa's spirv-to-dxil — SPIR-V → DXIL compiler for the D3D12 backend.
  # MIT-licensed, NIR-based (no LLVM dependency), ~5-15 MB static archive.
  # Replaces the DXC subprocess invocation that was libmental's old
  # HLSL → DXIL stage; libmental can now feed SPIR-V (already its hub
  # format) directly to D3D12 via this library.
  #
  # Built for Linux (amd64 + arm64) and Windows (amd64 + arm64).  D3D12
  # is Windows-only at runtime — Surface Pro X / Snapdragon X Elite
  # ARM64 Windows machines are first-class D3D12 hosts, so we build for
  # arm64 too — and Linux gets the artifact as build-validation cover.
  # macOS and WASM are skipped: Mesa's microsoft/compiler subtree pulls
  # in <malloc.h> which doesn't exist on Apple, and neither platform
  # has a D3D12 backend at runtime.
  #
  # Windows ARM64 builds NATIVELY on the windows-11-arm runner via
  # MSYS2's CLANGARM64 subsystem (no cross-compile gymnastics required).
  build-mesa-spirv-to-dxil:
    needs: [verify-licenses]
    name: "Build Mesa spirv-to-dxil (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            msys_subsystem: MINGW64
            mingw_pkg_prefix: x86_64
          - os: windows-latest
            runner: windows-11-arm
            platform: windows-arm64
            msys_subsystem: CLANGARM64
            mingw_pkg_prefix: clang-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Linux: install ninja + python3 from apt.  Meson comes from pip,
      # NOT apt — Ubuntu 24.04 (ubuntu-latest as of this writing) ships
      # meson 1.3.2 via apt, but Mesa 26.0.6 requires meson >= 1.4.0.
      # pip3 install lands in $HOME/.local/bin, which we surface via
      # $GITHUB_PATH so subsequent steps (and the build script's
      # `command -v meson` check) find it ahead of any system meson.
      #
      # Mesa's meson build also wants the python `mako` and `pyyaml`
      # packages; the build script pip-installs those defensively.
      - name: Setup Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3 python3-pip
          pip3 install --user --break-system-packages "meson>=1.4.0"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Windows: pacman packages for the matching MSYS2 subsystem.
      #   MINGW64    on x86_64 → mingw-w64-x86_64-*       (gcc toolchain)
      #   CLANGARM64 on arm64  → mingw-w64-clang-aarch64-* (clang toolchain;
      #                          no native gcc cross to ARM64 in MSYS2)
      # Both subsystems ship meson, ninja, python, and the python-{mako,
      # yaml,packaging} modules Mesa's build helpers need.
      #
      # python-packaging is load-bearing: Mesa's meson.build does
      #   from packaging.version import Version
      #   except: from distutils.version import StrictVersion
      # but distutils was REMOVED from Python's stdlib in 3.12.  Python
      # 3.14 (what MSYS2 currently ships) hits the except, finds no
      # distutils either, and aborts.  Installing python-packaging is
      # the modern path.
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys_subsystem }}
          update: false
          cache: true
          install: >-
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-cc
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-meson
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-ninja
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-python
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-python-mako
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-python-yaml
            mingw-w64-${{ matrix.mingw_pkg_prefix }}-python-packaging
            git

      - name: Build Mesa spirv-to-dxil (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/build-mesa-spirv-to-dxil.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MENTAL_PLATFORM="${{ matrix.platform }}" \
          bash scripts/build-mesa-spirv-to-dxil.sh

      - name: Build Mesa spirv-to-dxil (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MENTAL_PLATFORM="${{ matrix.platform }}" \
          bash scripts/build-mesa-spirv-to-dxil.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-to-dxil-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-to-dxil-${{ matrix.platform }}.tar.gz

  build-llvm:
    needs: [verify-licenses, determine-shas]
    name: "Build LLVM (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
            macos_arch: arm64
          - runner: macos-14
            platform: darwin-amd64
            macos_arch: x86_64
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: windows-latest
            platform: windows-amd64
            mingw_arch: x86_64
          - runner: windows-11-arm
            platform: windows-arm64
            mingw_arch: x86_64
          - runner: ubuntu-latest
            platform: wasm
            wasm: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM build
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/output/llvm-${{ matrix.platform }}.*
          # Include the resolved LLVM SHA so a clspv bump (which changes the
          # SHA) invalidates the cache automatically — otherwise we'd ship
          # stale LLVM against a clspv that expects new APIs.
          key: llvm-${{ matrix.platform }}-${{ needs.determine-shas.outputs.llvm_sha }}-${{ hashFiles('scripts/build-llvm.sh', 'scripts/common.sh') }}

      - name: Install dependencies (Linux ARM64)
        if: steps.cache-llvm.outputs.cache-hit != 'true' && matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

      - name: Install MinGW (Windows)
        if: steps.cache-llvm.outputs.cache-hit != 'true' && runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-${{ matrix.mingw_arch }}-cmake
            mingw-w64-${{ matrix.mingw_arch }}-ninja
            mingw-w64-${{ matrix.mingw_arch }}-python
            mingw-w64-${{ matrix.mingw_arch }}-clang
            mingw-w64-${{ matrix.mingw_arch }}-lld
            git
            make

      - name: Install Emscripten (WASM)
        if: steps.cache-llvm.outputs.cache-hit != 'true' && matrix.wasm
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "5.0.1"

      - name: Build LLVM (Unix)
        if: steps.cache-llvm.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/build-llvm.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          WASM_BUILD="${{ matrix.wasm && '1' || '0' }}" \
          LLVM_SHA="${{ needs.determine-shas.outputs.llvm_sha }}" \
          MENTAL_PLATFORM="${{ matrix.platform }}" bash scripts/build-llvm.sh

      - name: Build LLVM (Windows)
        if: steps.cache-llvm.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          chmod +x scripts/build-llvm.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          LLVM_SHA="${{ needs.determine-shas.outputs.llvm_sha }}" \
          MENTAL_PLATFORM="${{ matrix.platform }}" bash scripts/build-llvm.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/llvm-${{ matrix.platform }}.*

  build-clspv:
    needs: [build-llvm, determine-shas]
    name: "Build clspv (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
            macos_arch: arm64
          - runner: macos-14
            platform: darwin-amd64
            macos_arch: x86_64
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: windows-latest
            platform: windows-amd64
          - runner: windows-11-arm
            platform: windows-arm64
          - runner: ubuntu-latest
            platform: wasm
            wasm: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache clspv build
        id: cache-clspv
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/output/clspv-${{ matrix.platform }}.*
          # Key composition:
          #   - platform: separate cache per target
          #   - clspv_sha: rebuild when clspv main moves
          #   - llvm_sha:  rebuild when LLVM (the linkage substrate) moves,
          #                even if clspv itself didn't change — clspv
          #                links against LLVM's internal headers and ABIs
          #   - script hashes: rebuild when our build recipe changes
          # All four dimensions are necessary; dropping any one ships
          # mismatched binaries.
          key: clspv-${{ matrix.platform }}-${{ needs.determine-shas.outputs.clspv_sha }}-${{ needs.determine-shas.outputs.llvm_sha }}-${{ hashFiles('scripts/build-clspv.sh', 'scripts/common.sh') }}

      # Everything below is gated on cache miss — on a hit the cached
      # tarball already lives at $RUNNER_TEMP/output and we skip straight
      # to the upload step.  Notably this means we ALSO skip the LLVM
      # download/extract on cache hit (~2 GB transfer + decompress saved).

      - name: Download LLVM
        if: steps.cache-clspv.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: llvm-${{ matrix.platform }}
          path: artifacts

      - name: Extract LLVM
        if: steps.cache-clspv.outputs.cache-hit != 'true'
        run: tar -xzf artifacts/llvm-${{ matrix.platform }}.tar.gz

      - name: Setup Python
        if: steps.cache-clspv.outputs.cache-hit != 'true' && runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MinGW (Windows)
        # Must match the UCRT64 toolchain LLVM was built with, otherwise
        # LLVM's UCRT-decorated symbols (e.g. __imp__setjmp) won't resolve.
        if: steps.cache-clspv.outputs.cache-hit != 'true' && runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            git
            make

      - name: Install Emscripten (WASM)
        if: steps.cache-clspv.outputs.cache-hit != 'true' && matrix.wasm
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "5.0.1"

      - name: Build clspv (Unix)
        if: steps.cache-clspv.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/build-clspv.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          LLVM_BUILD_DIR="$(pwd)/llvm-${{ matrix.platform }}" \
          WASM_BUILD="${{ matrix.wasm && '1' || '0' }}" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          CLSPV_SHA="${{ needs.determine-shas.outputs.clspv_sha }}" \
          MENTAL_PLATFORM="${{ matrix.platform }}" bash scripts/build-clspv.sh

      - name: Build clspv (Windows)
        if: steps.cache-clspv.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          chmod +x scripts/build-clspv.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          LLVM_BUILD_DIR="$(pwd)/llvm-${{ matrix.platform }}" \
          CLSPV_SHA="${{ needs.determine-shas.outputs.clspv_sha }}" \
          MENTAL_PLATFORM="${{ matrix.platform }}" bash scripts/build-clspv.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clspv-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/clspv-${{ matrix.platform }}.*

  build-spirv-llvm-translator:
    needs: [build-llvm, determine-shas]
    name: "Build SPIRV-LLVM-Translator (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
            macos_arch: arm64
          - runner: macos-14
            platform: darwin-amd64
            macos_arch: x86_64
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: windows-latest
            platform: windows-amd64
          - runner: windows-11-arm
            platform: windows-arm64
          - runner: ubuntu-latest
            platform: wasm
            wasm: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPIRV-LLVM-Translator build
        id: cache-translator
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/output/spirv-llvm-translator-${{ matrix.platform }}.*
          # Same key dimensions as clspv: platform + translator SHA + LLVM
          # SHA + script hashes.  Translator's link contract with LLVM is
          # the same kind of internal-API binding clspv has, so an LLVM
          # bump must invalidate this cache too.
          key: spirv-llvm-translator-${{ matrix.platform }}-${{ needs.determine-shas.outputs.translator_sha }}-${{ needs.determine-shas.outputs.llvm_sha }}-${{ hashFiles('scripts/build-spirv-llvm-translator.sh', 'scripts/common.sh') }}

      - name: Download LLVM
        if: steps.cache-translator.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: llvm-${{ matrix.platform }}
          path: artifacts

      - name: Extract LLVM
        if: steps.cache-translator.outputs.cache-hit != 'true'
        run: tar -xzf artifacts/llvm-${{ matrix.platform }}.tar.gz

      - name: Install MinGW (Windows)
        # Must match the UCRT64 toolchain LLVM was built with, otherwise
        # LLVM's UCRT-decorated symbols (e.g. __imp__setjmp) won't resolve.
        if: steps.cache-translator.outputs.cache-hit != 'true' && runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            git
            make

      - name: Install Emscripten (WASM)
        if: steps.cache-translator.outputs.cache-hit != 'true' && matrix.wasm
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "5.0.1"

      - name: Build SPIRV-LLVM-Translator (Unix)
        if: steps.cache-translator.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/build-spirv-llvm-translator.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          LLVM_BUILD_DIR="$(pwd)/llvm-${{ matrix.platform }}" \
          WASM_BUILD="${{ matrix.wasm && '1' || '0' }}" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          TRANSLATOR_SHA="${{ needs.determine-shas.outputs.translator_sha }}" \
          MENTAL_PLATFORM="${{ matrix.platform }}" bash scripts/build-spirv-llvm-translator.sh

      - name: Build SPIRV-LLVM-Translator (Windows)
        if: steps.cache-translator.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          chmod +x scripts/build-spirv-llvm-translator.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          LLVM_BUILD_DIR="$(pwd)/llvm-${{ matrix.platform }}" \
          TRANSLATOR_SHA="${{ needs.determine-shas.outputs.translator_sha }}" \
          MENTAL_PLATFORM="${{ matrix.platform }}" bash scripts/build-spirv-llvm-translator.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-llvm-translator-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-llvm-translator-${{ matrix.platform }}.*

  build-naga:
    needs: [verify-licenses]
    name: "Build Naga (${{ matrix.platform }})"
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
            macos_arch: arm64
          - runner: macos-14
            platform: darwin-amd64
            macos_arch: x86_64
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: windows-latest
            platform: windows-amd64
          - runner: windows-latest
            platform: windows-arm64
            cross_compile_target: aarch64
          - runner: ubuntu-latest
            platform: wasm
            wasm: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Emscripten (WASM)
        if: matrix.wasm
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "5.0.1"

      - name: Build Naga (WASM)
        if: matrix.wasm
        run: |
          chmod +x scripts/build-naga-wasm.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          bash scripts/build-naga-wasm.sh

      - name: Build Naga (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          chmod +x scripts/build-naga.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          CROSS_COMPILE_TARGET="${{ matrix.cross_compile_target || '' }}" \
          bash scripts/build-naga.sh

      - name: Build Naga (macOS/Linux)
        if: runner.os != 'Windows' && !matrix.wasm
        shell: bash
        run: |
          chmod +x scripts/build-naga.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          CMAKE_ARCH="${{ matrix.platform == 'linux-arm64' && 'aarch64' || '' }}" \
          bash scripts/build-naga.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: naga-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/naga-${{ matrix.platform }}.*

  download-wgpu-native:
    needs: [verify-licenses]
    name: Download wgpu-native (Prebuilt)
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-14
            wgpu_platform: macos-aarch64
          - platform: darwin-amd64
            os: macos-latest
            wgpu_platform: macos-x86_64
          - platform: linux-amd64
            os: ubuntu-latest
            wgpu_platform: linux-x86_64
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            wgpu_platform: linux-aarch64
          - platform: windows-amd64
            os: windows-latest
            wgpu_platform: windows-x86_64-msvc
          - platform: windows-arm64
            os: windows-latest
            wgpu_platform: windows-aarch64-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download wgpu-native
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Query GitHub for latest release (authenticated to avoid rate limits)
          echo "Querying GitHub for latest wgpu-native release..."
          LATEST_RELEASE=$(curl -sH "Authorization: token $GH_TOKEN" https://api.github.com/repos/gfx-rs/wgpu-native/releases/latest)
          VERSION=$(echo "$LATEST_RELEASE" | grep '"tag_name"' | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Warning: Could not determine latest version, using v27.0.4.0"
            VERSION="v27.0.4.0"
          fi
          echo "Latest version: $VERSION"

          # Download licenses first (fail fast)
          echo "Downloading licenses..."
          mkdir -p licenses
          curl -sL -o licenses/LICENSE.MIT \
            "https://raw.githubusercontent.com/gfx-rs/wgpu-native/trunk/LICENSE.MIT" || \
          curl -sL -o licenses/LICENSE.MIT \
            "https://raw.githubusercontent.com/gfx-rs/wgpu/trunk/LICENSE.MIT"
          curl -sL -o licenses/LICENSE.APACHE \
            "https://raw.githubusercontent.com/gfx-rs/wgpu-native/trunk/LICENSE.APACHE" || \
          curl -sL -o licenses/LICENSE.APACHE \
            "https://raw.githubusercontent.com/gfx-rs/wgpu/trunk/LICENSE.APACHE"

          if [ ! -s licenses/LICENSE.MIT ] || [ ! -s licenses/LICENSE.APACHE ]; then
            echo "Error: Failed to download license files"
            exit 1
          fi
          echo "Licenses verified"

          # Download prebuilt archive
          DOWNLOAD_URL="https://github.com/gfx-rs/wgpu-native/releases/download/${VERSION}/wgpu-${{ matrix.wgpu_platform }}-release.zip"
          echo "Downloading: $DOWNLOAD_URL"
          curl -sL -o wgpu.zip "$DOWNLOAD_URL"

          # Extract
          mkdir -p extract
          unzip -q wgpu.zip -d extract

          # Package
          PACKAGE_DIR="output/wgpu-${{ matrix.platform }}"
          mkdir -p "$PACKAGE_DIR/include/webgpu"
          mkdir -p "$PACKAGE_DIR/lib"

          # Copy headers
          cp extract/include/webgpu/webgpu.h "$PACKAGE_DIR/include/webgpu/"
          cp extract/include/webgpu/wgpu.h "$PACKAGE_DIR/include/webgpu/"

          # Copy libraries (grab everything in lib/)
          cp extract/lib/* "$PACKAGE_DIR/lib/" 2>/dev/null || true

          # Copy licenses
          cp licenses/LICENSE.MIT "$PACKAGE_DIR/"
          cp licenses/LICENSE.APACHE "$PACKAGE_DIR/"

          # Create archive
          cd output
          tar -czf "wgpu-${{ matrix.platform }}.tar.gz" "wgpu-${{ matrix.platform }}"
          echo "Created: wgpu-${{ matrix.platform }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgpu-${{ matrix.platform }}
          path: output/wgpu-${{ matrix.platform }}.tar.gz

  determine-version:
    name: Determine Version
    needs: [build-glslang, build-spirv-cross, build-mesa-spirv-to-dxil, build-llvm, build-clspv, build-spirv-llvm-translator, build-naga, download-wgpu-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Need write permission to create and push tags
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to find all tags

      - name: Calculate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - calculate next version from latest tag
            # Get all tags matching vX.Y.Z format (excluding go/fetch/gpu tags like go/fetch/gpu/v1.0.0)
            LATEST_TAG=$(git tag | grep '^v[0-9]\+\.[0-9]\+\.[0-9]\+$' | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              # No tags yet - start at v0.0.45 (continuing from where we left off)
              LATEST_TAG="v0.0.44"
            fi
            echo "Latest tag: $LATEST_TAG"

            # Extract version numbers (expecting vX.Y.Z format)
            if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"

              # Increment patch version
              NEXT_PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
            else
              # Fallback if tag format is unexpected
              VERSION="v0.0.45"
            fi

            echo "Next version: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            # Create and push the tag (both for main release and go/fetch/gpu module)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Create main release tag (vX.Y.Z)
            git tag $VERSION
            git push origin $VERSION
          else
            # Tag push - use the tag name
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create Shader Binaries Release
    needs: [determine-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download shader binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{glslang,spirv-cross,spirv-to-dxil,naga,wgpu,llvm,clspv,spirv-llvm-translator}-*'

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Create redistributables Release
        # softprops/action-gh-release@v1 uploads all release assets
        # concurrently. Our release is ~9GB across 46 assets (seven
        # LLVM artifacts alone are 1–1.8GB each). Parallel Node.js
        # uploads of that payload reliably OOM the runner — the Actions
        # infra sends a "runner has received a shutdown signal" ~30s
        # into the upload burst. Switching to the gh CLI and uploading
        # one asset at a time keeps memory bounded and is resumable
        # via --clobber across workflow re-runs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.determine-version.outputs.version }}
          GPU_VERSION: ${{ needs.determine-version.outputs.gpu_version }}
        run: |
          set -eo pipefail
          shopt -s globstar nullglob

          # Render release notes from the template. Using sed substitution
          # rather than heredoc expansion keeps the template file usable
          # as-is for local inspection and doesn't require escaping every
          # backtick/dollar-sign in the markdown body.
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__GPU_VERSION__|${GPU_VERSION}|g" \
            .github/release-notes.template.md > /tmp/release-body.md

          # Create the release (idempotent — if a prior attempt of this
          # workflow created it, we just update the notes and reuse the
          # existing tag/release record).
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — updating notes, re-uploading assets with --clobber"
            gh release edit "$VERSION" --notes-file /tmp/release-body.md
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file /tmp/release-body.md
          fi

          # Serial upload loop. --clobber overwrites any asset from a
          # prior attempt. Single retry on transient GitHub API errors.
          COUNT=0
          FAILED=0
          for f in artifacts/**/*.tar.gz artifacts/**/*.zip; do
            COUNT=$((COUNT + 1))
            SIZE=$(du -h "$f" | cut -f1)
            echo "[$COUNT] ⬆️  $(basename "$f") ($SIZE)"
            if ! gh release upload "$VERSION" "$f" --clobber; then
              echo "  ⚠️  upload failed; sleeping 10s and retrying once..."
              sleep 10
              if ! gh release upload "$VERSION" "$f" --clobber; then
                echo "  ❌ retry failed for $f"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          echo "Uploaded $((COUNT - FAILED))/$COUNT assets to $VERSION"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED asset(s) failed to upload after retry"
            exit 1
          fi

