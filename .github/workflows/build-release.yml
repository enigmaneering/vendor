name: Build and Release Vendor Tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-glslang:
    name: Build glslang
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            arch: x64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build glslang
        shell: bash
        run: |
          chmod +x scripts/build-glslang.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          CMAKE_ARCH="${{ matrix.arch || '' }}" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-glslang.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glslang-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/glslang-${{ matrix.platform }}.*

  build-spirv-cross:
    name: Build SPIRV-Cross
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows-latest
            runner: windows-latest
            platform: windows-amd64
            arch: x64
          - os: windows-latest
            runner: windows-latest
            platform: windows-arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build SPIRV-Cross
        shell: bash
        run: |
          chmod +x scripts/build-spirv-cross.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          CMAKE_ARCH="${{ matrix.arch || '' }}" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-spirv-cross.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spirv-cross-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/spirv-cross-${{ matrix.platform }}.*

  build-dxc-macos:
    name: Build DXC (macOS)
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            runner: macos-14  # ARM64
            platform: darwin-arm64
            macos_arch: arm64
          - os: macos-latest
            runner: macos-14  # Cross-compile x86_64 on ARM64
            platform: darwin-amd64
            macos_arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build DXC
        shell: bash
        run: |
          chmod +x scripts/build-dxc.sh
          BUILD_DIR="${{ runner.temp }}/build" \
          OUTPUT_DIR="${{ runner.temp }}/output" \
          MACOS_ARCH="${{ matrix.macos_arch || '' }}" \
          bash scripts/build-dxc.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: ${{ runner.temp }}/output/dxc-${{ matrix.platform }}.*

  download-dxc-linux:
    name: Download DXC (Linux)
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-amd64
            filename: linux_dxc_2024_07_31.x86_64.tar.gz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Microsoft DXC Release
        run: |
          DOWNLOAD_URL="https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2407/${{ matrix.filename }}"
          echo "Downloading DXC for ${{ matrix.platform }}"
          echo "Download URL: $DOWNLOAD_URL"

          curl -L -o dxc.tar.gz "$DOWNLOAD_URL"

          # Extract and repackage
          mkdir -p output/dxc-${{ matrix.platform }}
          tar -xzf dxc.tar.gz -C output/dxc-${{ matrix.platform }}

          # Create archive
          cd output
          tar -czf dxc-${{ matrix.platform }}.tar.gz dxc-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: output/dxc-${{ matrix.platform }}.tar.gz

  download-dxc-windows:
    name: Download DXC (Windows)
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: windows-amd64
            arch: x64
          - platform: windows-arm64
            arch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Microsoft DXC Release
        run: |
          # Get latest DXC release from Microsoft
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest | grep '"browser_download_url".*dxc.*\.zip"' | grep -v pdb | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Downloading DXC $LATEST_RELEASE for ${{ matrix.platform }}"
          echo "Download URL: $DOWNLOAD_URL"

          # Determine the correct binary suffix
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            BINARY_SUFFIX="arm64"
          else
            BINARY_SUFFIX="x64"
          fi

          # Download the Windows release
          curl -L -o dxc.zip "$DOWNLOAD_URL"

          # Extract and repackage for our platform
          mkdir -p output/dxc-${{ matrix.platform }}
          unzip -q dxc.zip -d extracted

          # Copy binaries and libraries
          mkdir -p output/dxc-${{ matrix.platform }}/bin
          mkdir -p output/dxc-${{ matrix.platform }}/lib
          mkdir -p output/dxc-${{ matrix.platform }}/include

          # Copy appropriate architecture binaries
          if [ -d "extracted/bin/${BINARY_SUFFIX}" ]; then
            cp -r extracted/bin/${BINARY_SUFFIX}/* output/dxc-${{ matrix.platform }}/bin/
          else
            # Fallback to x64 if arm64 not available
            cp -r extracted/bin/x64/* output/dxc-${{ matrix.platform }}/bin/
          fi

          # Copy libraries
          if [ -d "extracted/lib/${BINARY_SUFFIX}" ]; then
            cp -r extracted/lib/${BINARY_SUFFIX}/* output/dxc-${{ matrix.platform }}/lib/
          else
            cp -r extracted/lib/x64/* output/dxc-${{ matrix.platform }}/lib/
          fi

          # Copy headers
          cp -r extracted/inc/* output/dxc-${{ matrix.platform }}/include/

          # Create archive
          cd output
          zip -r dxc-${{ matrix.platform }}.zip dxc-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxc-${{ matrix.platform }}
          path: output/dxc-${{ matrix.platform }}.zip

  create-release:
    name: Create Release
    needs: [build-glslang, build-spirv-cross, build-dxc-macos, download-dxc-linux, download-dxc-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          body: |
            # Vendor Tools Release ${{ steps.version.outputs.version }}

            Pre-built shader compilation toolchain for all platforms.

            ## Included Tools

            - **glslang** - GLSL to SPIRV compiler with optimizer
            - **SPIRV-Cross** - SPIRV transpiler (GLSL/HLSL/MSL)
            - **DXC** - DirectX Shader Compiler (HLSL to SPIRV/DXIL)

            ## Supported Platforms

            - macOS ARM64 (Apple Silicon)
            - macOS x86_64 (Intel)
            - Linux x86_64
            - Windows x86_64

            ## Usage

            Download the appropriate archives for your platform and extract to your project's `external/` directory.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
